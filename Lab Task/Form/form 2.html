<!DOCTYPE html>
<html>
<head>
<style>
       body {
           font-family: Arial, sans-serif;
           background-color: #f8f9fa;
           display: flex;
           justify-content: center;
           padding: 20px;
       }
       .form-box {
           background: white;
           padding: 30px;
           width: 350px;
           border: 1px solid #e0e0e0;
       }
       /* গাঢ় নীল কালার কোড */
       h2 { color: #203562; margin-bottom: 5px; }
       p { color: #555; margin-bottom: 20px; }
       hr { border: 0; border-top: 2px solid #203562; margin-bottom: 20px; }
       label { display: block; font-weight: bold; color: #203562; margin-top: 15px; }
       input, select {
           width: 100%;
           padding: 12px;
           margin-top: 5px;
           border: 1px solid #ccc;
           box-sizing: border-box;
           color: #999;
       }
       .button-group { display: flex; gap: 10px; margin-top: 20px; }
       button { padding: 15px; cursor: pointer; border: none; font-weight: bold; }
       /* বাটনের গাঢ় নীল কালার */
       .submit { background-color: #203562; color: white; flex: 3; }
       .reset { background-color: white; border: 1px solid #203562; color: #203562; flex: 1; }
</style>
</head>
<body>
<div class="form-box">
<h2>Registration</h2>
<p>Please complete all fields below.</p>
<hr>
<label>Full Name</label>
<input type="text" value="Jane Doe">
<label>Postal Code</label>
<input type="text" value="10001">
<label>Date of Birth</label>
<input type="text" value="25/06/2026">
<label>Email Address</label>
<input type="text" value="jane@example.com">
<label>Password</label>
<input type="password" value="password">
<label>Country</label>
<select>
<option>Select a country...</option>
</select>
<div class="button-group">
<button class="submit">Submit</button>
<button class="reset">Reset</button>
</div>
</div>
</body>
</html>
